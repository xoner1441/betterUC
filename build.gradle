        tasks.register(variant.taskName, Exec) {
            group = "multi-version"
            description = variant.description
            workingDir projectDir
            if (variant.useLegacyGeneratedSources) {
                dependsOn tasks.named("generateMc1_21_10Sources")
            }

            def props = variantProjectProperties(variant).collect { key, value -> "-P${key}=${value}" }
            commandLine([file("gradlew.bat").absolutePath, "--project-dir", variant.legacyBuildProjectDir, "clean", "build", "--no-daemon", "-PbetterucRootDir=${projectDir.absolutePath}"] + props)
        }
    } else {
        tasks.register(variant.taskName, GradleBuild) {
            group = "multi-version"
            description = variant.description
            buildName = variant.id
            dir = projectDir
            tasks = ["clean", "build"]

            startParameter.projectProperties.putAll(gradle.startParameter.projectProperties)
            startParameter.projectProperties.putAll(variantProjectProperties(variant))
        }
    }
}

