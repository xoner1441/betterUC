    text = text.replace(".index", ".id")
    text = text.replace(".idOf(", ".indexOf(")
    if (text.contains("extends Screen")) {
        text = text.replaceAll(/(?<!\.)\bminecraft\b/, "client")
        text = text.replace("this.font", "this.textRenderer")
        text = text.replaceAll(/(?<!\.)\bfont\b/, "textRenderer")
    }
    text = text.replace("renderBackground(context);", "renderInGameBackground(context);")
    text = text.replace("client.world.dimension().identifier().toString()", "client.world.getRegistryKey().getValue().toString()")
    if (text.contains("class ChatBlacklistMixin")) {
        text = text.replace("import org.spongepowered.asm.mixin.Shadow;\n", "")
        text = text.replace("method = \"addMessageToQueue(Lnet/minecraft/client/gui/hud/ChatHudLine;)V\"", "method = \"addMessage(Lnet/minecraft/client/gui/hud/ChatHudLine;)V\"")
        text = text.replace("method = \"addMessageToDisplayQueue(Lnet/minecraft/client/gui/hud/ChatHudLine;)V\"", "method = \"addVisibleMessage(Lnet/minecraft/client/gui/hud/ChatHudLine;)V\"")
        text = text.replaceAll(/(?s)\s*@Shadow\s+private List<ChatHudLine> allMessages;\s+@Shadow\s+private void refreshTrimmedMessages\(\) \{\s*\}\s+/, "\n\n")
        text = text.replaceAll(/(?s)\n\s*@Inject\(method = "addMessage\(Lnet\/minecraft\/client\/gui\/hud\/ChatHudLine;\)V", at = @At\("TAIL"\), require = 0\)\s+private void extendMessageHistory\(ChatHudLine message, CallbackInfo ci\) \{.*?\n\s*\}\s+\n\s*private boolean isLingeringSilentStatsLine/, "\n    private boolean isLingeringSilentStatsLine")
    }
    return text
}

tasks.register("generateMc1_21_10Sources") {
    group = "multi-version"
    description = "Generates the Minecraft 1.21.10/Yarn compatibility source tree from the shared 26.x sources."
    inputs.dir file("src/main/java")
    inputs.file file("build.gradle")
    outputs.dir betterucLegacyGeneratedJavaDir

    doLast {
        def outputDir = betterucLegacyGeneratedJavaDir.get().asFile
        delete outputDir
        outputDir.mkdirs()

        fileTree("src/main/java").matching { include "**/*.java" }.each { sourceFile ->
            def relative = projectDir.toPath().relativize(sourceFile.toPath()).toString()
                    .replace("src\\main\\java\\", "")
                    .replace("src/main/java/", "")
            def overrideFile = file("src/mc1_21_10/java/${relative}")
            if (overrideFile.exists()) {
                return
            }
            def targetFile = new File(outputDir, relative)
            targetFile.parentFile.mkdirs()
            targetFile.setText(transformLegacyJavaSource(sourceFile.getText("UTF-8")), "UTF-8")
        }
    }
}

if (betterucUseLegacyGeneratedSources) {
    tasks.named("compileJava") {
        dependsOn tasks.named("generateMc1_21_10Sources")
    }
    tasks.named("sourcesJar") {
        dependsOn tasks.named("generateMc1_21_10Sources")
    }
}

def minecraftModsDir = providers.gradleProperty("minecraftModsDir")
        .orElse(providers.environmentVariable("MINECRAFT_MODS_DIR"))
        .orElse(providers.environmentVariable("APPDATA").map { "${it}/.minecraft/mods" })
        .orElse("${projectDir}/run/mods")

def isMinecraftRunning = {
    def stream = ProcessHandle.allProcesses()
    try {
        def iterator = stream.iterator()
        while (iterator.hasNext()) {
            def processInfo = iterator.next().info()
            def command = processInfo.command().orElse("").toLowerCase(java.util.Locale.ROOT)
            if (!command.contains("java")) continue

            def commandLine = processInfo.commandLine().orElse("").toLowerCase(java.util.Locale.ROOT)
            if (commandLine.contains("knotclient")
                    || commandLine.contains("net.minecraft.client.main.main")
                    || commandLine.contains("fabric-loader")) {
                return true
            }
        }
        return false
    } catch (Exception ignored) {
        return false
    } finally {
        stream.close()
    }
}

tasks.register("copyModToMinecraftMods", Copy) {
    group = "build"
    description = "Copies the mod jar into the local Minecraft mods folder."

    dependsOn tasks.named("jar")
    from(tasks.named("jar").flatMap { it.archiveFile })
    into(minecraftModsDir.map { file(it) })

    doFirst {
        if (isMinecraftRunning()) {
            throw new GradleException(
                    "Minecraft appears to be running. Refusing to overwrite files in mods/ while the game is open " +
                            "because this can corrupt live class loading. Close Minecraft and rerun the build."
            )
        }

        def targetDir = file(minecraftModsDir.get())
        if (!targetDir.exists() && !targetDir.mkdirs()) {
            throw new GradleException("Could not create Minecraft mods directory: ${targetDir}")
        }

        def currentJar = tasks.named("jar").get().archiveFile.get().asFile.name
        def archiveBase = project.base.archivesName.get()
        targetDir.eachFile { jarFile ->
            if (!jarFile.name.endsWith(".jar")) return

            def lowerName = jarFile.name.toLowerCase()
            def staleModJar = jarFile.name.startsWith("${archiveBase}-")
                    || lowerName.startsWith("betteruc-")
            if (!staleModJar || jarFile.name == currentJar || lowerName.endsWith("-sources.jar")) return

            try {
                if (jarFile.delete()) {
                    logger.lifecycle("Removed stale mod jar ${jarFile.name}")
                } else {
                    logger.warn("Could not remove stale mod jar ${jarFile}; it may be in use.")
                }
            } catch (Exception ignored) {
                logger.warn("Could not remove stale mod jar ${jarFile}; it may be in use.")
            }
        }
        logger.lifecycle("Copying ${currentJar} to ${targetDir}")
    }

    doLast {
        def copiedJar = file("${minecraftModsDir.get()}/${tasks.named("jar").get().archiveFile.get().asFile.name}")
        try {
            def zip = new java.util.zip.ZipFile(copiedJar)
            try {
                def entries = zip.entries()
                byte[] buffer = new byte[8192]
                while (entries.hasMoreElements()) {
                    def entry = entries.nextElement()
                    if (!entry.isDirectory()) {
                        def input = zip.getInputStream(entry)
                        try {
                            while (input.read(buffer) != -1) {
                                // Read every entry so corrupt local ZIP headers fail during the build.
                            }
                        } finally {
                            input.close()
                        }
                    }
                }
            } finally {
                zip.close()
            }
        } catch (Exception ex) {
            throw new GradleException("Copied mod jar is unreadable or corrupted: ${copiedJar}", ex)
        }
    }
}

def copyToMinecraftMods = providers.gradleProperty("copyToMinecraftMods")
        .map { it.equalsIgnoreCase("true") }
        .orElse(true)

if (copyToMinecraftMods.get()) {
    tasks.named("build") {
        dependsOn tasks.named("copyModToMinecraftMods")
    }
}

