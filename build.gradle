plugins {
    id 'net.fabricmc.fabric-loom'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

def betterucBuildDir = providers.gradleProperty("betterucBuildDir")
if (betterucBuildDir.present) {
    layout.buildDirectory.set(file(betterucBuildDir.get()))
}

def betterucVariantSourceSet = (project.findProperty("betterucVariantSourceSet") ?: "").toString().trim()
def betterucUseLegacyGeneratedSources = (project.findProperty("betterucUseLegacyGeneratedSources") ?: "false").toString().equalsIgnoreCase("true")
def betterucLegacyGeneratedJavaDir = layout.buildDirectory.dir("generated/sources/betterucLegacy/java")

sourceSets {
    main {
        if (betterucUseLegacyGeneratedSources) {
            java.setSrcDirs([betterucLegacyGeneratedJavaDir])
        } else if (!betterucVariantSourceSet.isBlank()) {
            def variantJavaDir = file("src/${betterucVariantSourceSet}/java")
            if (variantJavaDir.exists()) {
                java.srcDir variantJavaDir
            }
        }

        if (!betterucVariantSourceSet.isBlank()) {
            def variantResourcesDir = file("src/${betterucVariantSourceSet}/resources")
            if (variantResourcesDir.exists()) {
                resources.srcDir variantResourcesDir
            }
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    def fabricApiModules = (project.findProperty("fabric_api_modules") ?: "")
            .toString()
            .split(",")
            .collect { it.trim() }
            .findAll { !it.isBlank() }
    if (fabricApiModules.isEmpty()) {
        implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    } else {
        fabricApiModules.each { moduleCoordinate ->
            compileOnly moduleCoordinate
            modCompileClasspath moduleCoordinate
        }
    }
    testImplementation "org.junit.jupiter:junit-jupiter:5.10.2"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_dependency", project.findProperty("minecraft_dependency") ?: "~${project.minecraft_version}"
    inputs.property "loader_dependency", project.findProperty("loader_dependency") ?: ">=${project.loader_version}"
    inputs.property "java_dependency", project.findProperty("java_dependency") ?: ">=${project.findProperty("target_java_version") ?: "25"}"
    filteringCharset "UTF-8"
    filesMatching("fabric.mod.json") {
        expand(
                "version": project.version,
                "minecraft_dependency": project.findProperty("minecraft_dependency") ?: "~${project.minecraft_version}",
                "loader_dependency": project.findProperty("loader_dependency") ?: ">=${project.loader_version}",
                "java_dependency": project.findProperty("java_dependency") ?: ">=${project.findProperty("target_java_version") ?: "25"}"
        )
    }
}

def targetJavaVersion = (project.findProperty("target_java_version") ?: "25") as int
tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        it.options.release = targetJavaVersion
    }
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    withSourcesJar()
}

jar {
    from("LICENSE") { rename { "${it}_${project.base.archivesName.get()}" } }
    def classifier = project.findProperty("modArchiveClassifier") ?: ""
    if (!classifier.toString().isBlank()) {
        archiveClassifier = classifier.toString()
    }
}

test {
    useJUnitPlatform()
}

def replaceLegacyMethodCalls = { String input, String methodName, String replacementName, String extraArgument ->
    String needle = methodName + "("
    StringBuilder output = new StringBuilder(input.length() + 256)
    int cursor = 0

    while (cursor < input.length()) {
        int methodStart = input.indexOf(needle, cursor)
        if (methodStart < 0) {
            output.append(input, cursor, input.length())
            break
        }

        int argsStart = methodStart + needle.length()
        int index = argsStart
        int depth = 1
        boolean inString = false
        boolean inChar = false
        boolean escaped = false

        while (index < input.length() && depth > 0) {
            char ch = input.charAt(index)
            if (escaped) {
                escaped = false
            } else if (ch == '\\' as char) {
                escaped = inString || inChar
            } else if (inString) {
                if (ch == '"' as char) inString = false
            } else if (inChar) {
                if (ch == '\'' as char) inChar = false
            } else if (ch == '"' as char) {
                inString = true
            } else if (ch == '\'' as char) {
                inChar = true
            } else if (ch == '(' as char) {
                depth++
            } else if (ch == ')' as char) {
                depth--
            }
            index++
        }

        if (depth != 0) {
            output.append(input, cursor, input.length())
            break
        }

        output.append(input, cursor, methodStart)
        output.append(replacementName).append("(")
        output.append(input, argsStart, index - 1)
        if (extraArgument != null && !extraArgument.isBlank()) {
            output.append(extraArgument)
        }
        output.append(")")
        cursor = index
    }

    output.toString()
}

