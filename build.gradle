tasks.register("buildReleaseJars") {
    group = "multi-version"
    description = "Builds the release jars that should be uploaded to GitHub."
    dependsOn "buildMc26_x", "buildMc1_21_10"
    doLast {
        def releaseDir = layout.buildDirectory.dir("release").get().asFile
        if (!releaseDir.exists() && !releaseDir.mkdirs()) {
            throw new GradleException("Could not create release directory: ${releaseDir}")
        }

        def modernJar = layout.buildDirectory
                .file("versions/mc26_1_2/libs/${project.base.archivesName.get()}-${project.version}-mc26.x.jar")
                .get()
                .asFile
        if (!modernJar.isFile()) {
            throw new GradleException("Modern release jar was not built: ${modernJar}")
        }
        def legacyJar = layout.buildDirectory
                .file("versions/mc1_21_10/libs/${project.base.archivesName.get()}-${project.version}-mc1.21.10.jar")
                .get()
                .asFile
        if (!legacyJar.isFile()) {
            throw new GradleException("Legacy 1.21.10 release jar was not built: ${legacyJar}")
        }

        copy {
            from modernJar, legacyJar
            into releaseDir
        }

        logger.lifecycle("Release jar ready: ${new File(releaseDir, modernJar.name)}")
        logger.lifecycle("Release jar ready: ${new File(releaseDir, legacyJar.name)}")
    }
}

